<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiestas que cuentan historias</title>
   
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
   
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Base typography overrides to match the design */
        .font-sans { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Merriweather', serif; }

        /* Print specifics */
        @media print {
            body { background: white !important; color: black !important; }
            .print\:hidden { display: none !important; }
            .page-break-after-always { page-break-after: always !important; }
            * {
                -webkit-print-color-adjust: exact !important;
                color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // SVG equivalents of the lucide-react icons used in the app
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const MapPin = (p) => <Icon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Calendar = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
        const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></Icon>;
        const Edit3 = (p) => <Icon {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></Icon>;
        const ArrowRight = (p) => <Icon {...p}><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>;
        const ArrowLeft = (p) => <Icon {...p}><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
        const List = (p) => <Icon {...p}><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></Icon>;
        const Globe = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Icon>;
        const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
        const CheckCircle2 = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
        const Printer = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></Icon>;
        const ExternalLink = (p) => <Icon {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></Icon>;
        const PlayCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></Icon>;
        const TrendingUp = (p) => <Icon {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></Icon>;
        const Camera = (p) => <Icon {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></Icon>;
        const ImageIcon = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Icon>;
        function App() {
          const [appData, setAppData] = useState(initialBookData);
          const [isEditMode, setIsEditMode] = useState(false);
          const [editModal, setEditModal] = useState({ isOpen: false, chapterId: null, type: '', index: 0, currentUrl: '', tempUrl: '' });
          const [previewError, setPreviewError] = useState(false);
          const [currentView, setCurrentView] = useState('cover'); // 'cover', 'toc', 'chapter', 'print'
          const [currentChapterIndex, setCurrentChapterIndex] = useState(0);
          const [activeTab, setActiveTab] = useState('story'); // 'story', 'culture', 'activities'
         
          // State to store student answers
          const [studentAnswers, setStudentAnswers] = useState({});

          const handleAnswerChange = (chapterId, questionIndex, value) => {
            setStudentAnswers(prev => ({
              ...prev,
              [chapterId]: {
                ...(prev[chapterId] || {}),
                [questionIndex]: value
              }
            }));
          };

          const goToChapter = (index) => {
            setCurrentChapterIndex(index);
            setActiveTab('story');
            setCurrentView('chapter');
            window.scrollTo(0, 0);
          };

          const nextChapter = () => {
            if (currentChapterIndex < appData.length - 1) {
              goToChapter(currentChapterIndex + 1);
            }
          };

          const prevChapter = () => {
            if (currentChapterIndex > 0) {
              goToChapter(currentChapterIndex - 1);
            } else {
              setCurrentView('toc');
            }
          };

          const handleSaveImageUrl = () => {
            setAppData(prev => prev.map(ch => {
              if (ch.id === editModal.chapterId) {
                if (editModal.type === 'cover') {
                  return { ...ch, image: editModal.tempUrl };
                } else if (editModal.type === 'gallery') {
                  const newGallery = [...ch.culture.gallery];
                  newGallery[editModal.index] = editModal.tempUrl;
                  return { ...ch, culture: { ...ch.culture, gallery: newGallery } };
                }
              }
              return ch;
            }));
            setEditModal({ isOpen: false, chapterId: null, type: '', index: 0, currentUrl: '', tempUrl: '' });
            setPreviewError(false);
          };

          // Helper para asignar color según nivel de vocabulario
          const getLevelColor = (level) => {
            if(level.includes('Inicial')) return 'bg-green-100 text-green-800 border-green-200';
            if(level.includes('Intermedio')) return 'bg-yellow-100 text-yellow-800 border-yellow-200';
            return 'bg-purple-100 text-purple-800 border-purple-200';
          };
                      <h1 className="text-5xl font-extrabold mb-4 uppercase tracking-widest font-sans">Fiestas que cuentan historias</h1>
                      <p className="text-2xl italic text-slate-700 mb-2">Un viaje cultural por el mundo hispanohablante</p>
                      <p className="text-xl font-bold border-t-2 border-b-2 border-black inline-block py-2 px-6 mt-4 font-sans">Cuaderno de Comprensión y Reflexión (IB)</p>
                      <div className="mt-16 flex flex-col items-start w-1/2 mx-auto gap-4 font-sans">
                        <div className="w-full flex border-b-2 border-black pb-1"><span className="font-bold mr-4">Nombre:</span> </div>
                        <div className="w-full flex border-b-2 border-black pb-1"><span className="font-bold mr-4">Fecha:</span> </div>
                      </div>
                    </div>

                    {appData.map((chapter, index) => (
                       <div key={chapter.id} className="mb-24 page-break-after-always">
                         
                          <div className="border-l-8 border-slate-800 pl-6 mb-8">
                            <h2 className="text-4xl font-black uppercase font-sans">
                              {index + 1}. {chapter.title}
                            </h2>
                            <h3 className="text-2xl text-slate-600 italic mt-2 flex items-center gap-2">
                               {chapter.country} • {chapter.vocabLevel}
                            </h3>
                          </div>
                         
                          <h4 className="text-2xl font-bold mb-4 font-sans bg-slate-100 p-2 inline-block">Lectura: "{chapter.storyTitle}"</h4>
                          <div className="text-justify leading-loose text-lg mb-8 space-y-4 pr-4">
                            {chapter.story.map((p, i) => (
                              <p key={i} className={p.startsWith('—') ? 'pl-8 italic' : ''}>{p}</p>
                            ))}
                          </div>

                          <h4 className="text-xl font-bold mb-4 border-b-2 border-slate-300 pb-2 font-sans">Vocabulario Bilingüe Escalonado</h4>
                          <div className="grid grid-cols-2 gap-x-8 gap-y-3 mb-10 text-lg bg-slate-50 p-6 border border-slate-200">
                            {chapter.keywords.map((kw, i) => (
                              <div key={i} className="flex border-b border-slate-300 border-dotted pb-1 font-sans">
                                <span className="font-bold w-1/2">{kw.word}</span>
                                <span className="italic text-slate-600 w-1/2">{kw.translation}</span>
                              </div>
                            ))}
                          </div>

                          <h4 className="text-2xl font-bold mb-6 font-sans bg-slate-100 p-2 inline-block">Actividades de Reflexión (IB)</h4>
                          <div className="space-y-12">
                             {chapter.activities.map((act, i) => (
                                <div key={i} className="mb-12 font-sans">
                                  <p className="font-bold text-lg mb-6 leading-relaxed">{i + 1}. {act}</p>
                                  <div className="border-b-2 border-slate-400 mt-10"></div>
                                  <div className="border-b-2 border-slate-400 mt-10"></div>
                                  <div className="border-b-2 border-slate-400 mt-10"></div>
                                  <div className="border-b-2 border-slate-400 mt-10"></div>
                                </div>
                             ))}
                          </div>
                       </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          }
